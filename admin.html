<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfection School - Admin Panel</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; margin: 0; padding: 20px; color: #1f2937; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #e5e7eb; padding-bottom: 15px; }
        .btn { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; }
        .btn:hover { background: #1d4ed8; }
        .btn-success { background: #10b981; }
        .btn-success:hover { background: #059669; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-family: inherit; }
        .card { border: 1px solid #e5e7eb; padding: 20px; border-radius: 8px; margin-bottom: 20px; background: #f9fafb; }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="ph-fill ph-shield-check" style="color:#2563eb;"></i> Admin Panel</h1>
        
        <div class="card" style="background: #eff6ff; border-color: #bfdbfe;">
            <h3><i class="ph ph-database"></i> 1-Qadam: Boshlang'ich ma'lumotlarni yuklash</h3>
            <p>Dastur birinchi marta ishlashi uchun barcha tayyor darslarni (Iboralar, Grammatika) bazaga yuklash kerak.</p>
            <button class="btn btn-success" onclick="seedData()"><i class="ph ph-cloud-arrow-up"></i> Bazaga Yuklash (Faqat 1 marta bosiladi)</button>
        </div>

        <div class="card">
            <h3><i class="ph ph-plus-circle"></i> Yangi Ibora (Phrase) qo'shish</h3>
            <div class="form-group">
                <label>Inglizcha (English)</label>
                <input type="text" id="phrase-en" placeholder="Masalan: Good luck">
            </div>
            <div class="form-group">
                <label>O'zbekcha (Uzbek)</label>
                <input type="text" id="phrase-uz" placeholder="Masalan: Omad">
            </div>
            <button class="btn" onclick="addPhrase()">Qo'shish</button>
        </div>
        
        <div class="card">
            <h3><i class="ph ph-users"></i> O'quvchilar Ro'yxati</h3>
            <button class="btn" onclick="loadUsers()"><i class="ph ph-arrows-clockwise"></i> Ro'yxatni Yangilash</button>
            <div id="users-list" style="margin-top: 15px; line-height: 1.6;"></div>
        </div>
    </div>

    <!-- Firebase Configuration and SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCl8oeI8yYddF-YuSuhCGN6fqZiEechjn8",
            authDomain: "perfection-school.firebaseapp.com",
            projectId: "perfection-school",
            storageBucket: "perfection-school.firebasestorage.app",
            messagingSenderId: "793168534663",
            appId: "1:793168534663:web:ad375713f143481b4a2c22",
            measurementId: "G-87NPRELTDH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.addPhrase = async function() {
            const en = document.getElementById('phrase-en').value;
            const uz = document.getElementById('phrase-uz').value;
            if(!en || !uz) return alert("Iltimos, ikkala maydonni ham to'ldiring!");
            
            try {
                await addDoc(collection(db, "phrases"), { en, uz });
                alert("Ibora muvaffaqiyatli qo'shildi!");
                document.getElementById('phrase-en').value = '';
                document.getElementById('phrase-uz').value = '';
            } catch (e) {
                alert("Xatolik: " + e.message);
            }
        }

        window.loadUsers = async function() {
            const list = document.getElementById('users-list');
            list.innerHTML = 'Yuklanmoqda...';
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                let html = '<ul>';
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    html += `<li><b>${data.name}</b> (${data.phone}) - XP: ${data.xp} - Daraja: ${data.level}</li>`;
                });
                html += '</ul>';
                if(html === '<ul></ul>') html = 'Hali o\'quvchilar yo\'q.';
                list.innerHTML = html;
            } catch (e) {
                list.innerHTML = "Xatolik: " + e.message;
            }
        }

        window.seedData = async function() {
            if(!confirm("Barcha boshlang'ich ma'lumotlar bazaga yuklansinmi? (Buni faqat 1 marta bosish kerak)")) return;
            
            const initialPhrases = [
                { en: "Hello / Hi", uz: "Salom" },
                { en: "Good morning", uz: "Xayrli tong" },
                { en: "Good evening", uz: "Xayrli kech" },
                { en: "How are you?", uz: "Qandaysiz?" },
                { en: "I'm fine, thank you", uz: "Men yaxshiman, rahmat" },
                { en: "What is your name?", uz: "Ismingiz nima?" },
                { en: "My name is...", uz: "Mening ismim..." },
                { en: "Nice to meet you", uz: "Tanishganimdan xursandman" },
                { en: "Please", uz: "Iltimos" },
                { en: "Thank you very much", uz: "Katta rahmat" },
                { en: "You're welcome", uz: "Arzimaydi" },
                { en: "Excuse me", uz: "Kechirasiz (e'tibor qaratish uchun)" },
                { en: "I'm sorry", uz: "Kechirasiz (uzr so'rash)" },
                { en: "I don't understand", uz: "Men tushunmadim" },
                { en: "Could you repeat that?", uz: "Qaytarib yubora olasizmi?" },
                { en: "Do you speak English?", uz: "Inglizcha gapirasizmi?" },
                { en: "How much is this?", uz: "Bu qancha turadi?" },
                { en: "Where is the bathroom?", uz: "Hojatxona qayerda?" },
                { en: "Help!", uz: "Yordam bering!" },
                { en: "Goodbye", uz: "Xayr" }
            ];

            try {
                let count = 0;
                for (let p of initialPhrases) {
                    await addDoc(collection(db, "phrases"), p);
                    count++;
                }
                alert(count + " ta ibora muvaffaqiyatli yuklandi! Endi buni qayta bosmang.");
            } catch(e) {
                alert("Xato: " + e);
            }
        }
    </script>
</body>
</html>
